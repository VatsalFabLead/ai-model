name: Python CI and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate Python App
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python app imports
        run: |
          python -m compileall app scripts run.py wsgi.py passenger_wsgi.py
          python -c "import app.main; print('App import ok')"

  # Hostinger shared hosting blocks inbound SFTP/FTP from GitHub cloud runners.
  # Deploy from your PC:  .\scripts\deploy_hostinger.ps1
  # Or upgrade to Hostinger VPS / use Render (render.yaml).
  deploy:
    name: Deploy to Hostinger (manual trigger)
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare deploy bundle
        run: |
          mkdir -p deploy_bundle
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.venv' \
            --exclude='venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='.mypy_cache' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --exclude='models/llm' \
            --exclude='*.gguf' \
            --exclude='my_resume.md' \
            --exclude='resume_output.md' \
            --exclude='deploy_bundle' \
            ./ deploy_bundle/

      - name: Deploy via SFTP (may fail on shared hosting)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        continue-on-error: true
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: "65002"
          local_path: "./deploy_bundle/*"
          remote_path: ${{ secrets.FTP_SERVER_DIR }}
          sftp_only: true
          sftpArgs: "-o ConnectTimeout=60 -o StrictHostKeyChecking=no"

      - name: Deploy note
        if: always()
        run: |
          echo "::warning::If SFTP timed out, Hostinger shared hosting blocks GitHub runners."
          echo "Run from your PC: scripts/deploy_hostinger.ps1"
